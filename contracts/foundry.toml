[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]
# keep fork tests out of the default run; invoke them explicitly with --match-path
no_match_path = "test/fork/*"

[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"

[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", url = "https://api.mantlescan.xyz/api", chain = 5000 }
